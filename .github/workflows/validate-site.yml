name: Validate Wonder Codex Site

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API test dependencies
        run: python -m pip install -r api/requirements.txt pytest

      - name: Run API tests
        working-directory: api
        run: pytest -q

      - name: Compile Python sources
        run: python -m compileall -q api/app

      - name: Check JavaScript syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -path './.git' -prune -o -name '*.js' -type f -print0)
