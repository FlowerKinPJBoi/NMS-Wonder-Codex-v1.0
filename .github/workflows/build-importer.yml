name: Build Wonder Codex Importer

on:
  workflow_dispatch:
  push:
    paths:
      - 'importer-app/**'
      - '.github/workflows/build-importer.yml'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify read-only contract
        shell: pwsh
        run: ./importer-app/scripts/verify-read-only.ps1

      - name: Restore
        run: dotnet restore importer-app/src/WonderCodex.Importer/WonderCodex.Importer.csproj

      - name: Run self-tests
        run: dotnet run --project importer-app/tools/WonderCodex.Importer.SelfTest/WonderCodex.Importer.SelfTest.csproj -c Release

      - name: Publish Windows x64 self-contained app
        run: >-
          dotnet publish importer-app/src/WonderCodex.Importer/WonderCodex.Importer.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishTrimmed=false
          -o importer-app/artifacts/win-x64

      - name: Package artifact
        shell: pwsh
        run: Compress-Archive -Path importer-app/artifacts/win-x64/* -DestinationPath WonderCodexImporter-v0.1.0-win-x64.zip

      - name: Upload trusted tester build
        uses: actions/upload-artifact@v4
        with:
          name: WonderCodexImporter-v0.1.0-win-x64
          path: WonderCodexImporter-v0.1.0-win-x64.zip
          if-no-files-found: error
